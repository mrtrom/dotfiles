add_newline = true
palette = "catppuccin_mocha"

# Prompt character
[character]
success_symbol = "[➜](bold green)"

# Language / framework modules
[package]
disabled = true

[conda]
format = '[$symbol$environment](dimmed green) '

[python]
disabled = false
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[nodejs]
disabled = false
detect_extensions = ["js", "jsx", "mjs", "cjs", "ts", "tsx"]
format = 'via [🤖 $version](bold green) '

[pulumi]
disabled = false

# Cloud
[aws]
disabled = false
format = '[$symbol($profile )(\($region\) )]($style)'
style = 'bold blue'

[gcloud]
disabled = true

# Git
[git_branch]
disabled = false
format = '[git:\($branch(:$remote_branch)\)]($style) '

[git_state]
disabled = true

[git_commit]
disabled = true

[git_status]
disabled = true
ahead = '⇡${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
behind = '⇣${count}'
modified = '!${count}'

# Directory
[directory]
truncation_length = 8
truncate_to_repo = false
use_logical_path = true

# Timing
[cmd_duration]
min_time = 10

[time]
disabled = false
format = '[$time]($style) '
style = 'dimmed white'

# Theme — Catppuccin Mocha
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
