add_newline = true
palette = "dracula"

# Prompt character
[character]
success_symbol = "[➜](bold green)"

# Language / framework modules
[package]
disabled = true

[conda]
format = '[$symbol$environment](dimmed green) '

[python]
disabled = false
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[nodejs]
disabled = false
detect_extensions = ["js", "jsx", "mjs", "cjs", "ts", "tsx"]
format = 'via [🤖 $version](bold green) '

[pulumi]
disabled = false

# Cloud
[aws]
disabled = false
format = '[$symbol($profile )(\($region\) )]($style)'
style = 'bold blue'

[gcloud]
disabled = true

# Git
[git_branch]
disabled = false
format = '[git:\($branch(:$remote_branch)\)]($style) '

[git_state]
disabled = true

[git_commit]
disabled = true

[git_status]
disabled = true
ahead = '⇡${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
behind = '⇣${count}'
modified = '!${count}'

# Directory
[directory]
truncation_length = 8
truncate_to_repo = false
use_logical_path = true

# Timing
[cmd_duration]
min_time = 10

[time]
disabled = false
format = '[$time]($style) '
style = 'dimmed white'

# Theme — Dracula
[palettes.dracula]
background = "#282a36"
current_line = "#44475a"
foreground = "#f8f8f2"
comment = "#6272a4"
cyan = "#8be9fd"
green = "#50fa7b"
orange = "#ffb86c"
pink = "#ff79c6"
purple = "#bd93f9"
red = "#ff5555"
yellow = "#f1fa8c"
