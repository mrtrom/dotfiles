# yaml-language-server: $schema=https://raw.githubusercontent.com/jesseduffield/lazygit/master/schema/config.json

gui:
  nerdFontsVersion: "3"
  showFileTree: true
  showRandomTip: false
  commitLength:
    show: true
  theme:
    activeBorderColor:
      - '#50fa7b'
      - bold
    inactiveBorderColor:
      - '#44475a'
    searchingActiveBorderColor:
      - '#ffb86c'
      - bold
    optionsTextColor:
      - '#8be9fd'
    selectedLineBgColor:
      - '#44475a'
    selectedRangeBgColor:
      - '#44475a'
    cherryPickedCommitBgColor:
      - '#44475a'
    cherryPickedCommitFgColor:
      - '#ff79c6'
    unstagedChangesColor:
      - '#ff5555'
    defaultFgColor:
      - '#f8f8f2'

customCommands:
  # ===========================================================================
  # Global commands
  # ===========================================================================
  - key: "U"
    context: "global"
    command: "git up"
    description: "Up"

  # --- Worktree operations menu (accessible from anywhere) ---
  - key: "W"
    description: "Worktree operations"
    commandMenu:
      - key: "n"
        context: "global"
        description: "New sibling worktree (new branch from HEAD)"
        prompts:
          - type: "input"
            title: "New branch & worktree name (from {{ .CheckedOutBranch.Name }}):"
            key: "Name"
            initialValue: ""
        command: >-
          git worktree add ../{{ .Form.Name }} -b {{ .Form.Name }} &&
          ~/.config/git/worktree-init ../{{ .Form.Name }}
        loadingText: "Creating worktree..."
        output: "log"

      - key: "e"
        context: "global"
        description: "New sibling worktree (existing branch)"
        prompts:
          - type: "input"
            title: "Branch to check out:"
            key: "Branch"
            suggestions:
              preset: "branches"
          - type: "input"
            title: "Worktree directory name:"
            key: "Dir"
            initialValue: "{{ .Form.Branch }}"
        command: >-
          git worktree add ../{{ .Form.Dir }} {{ .Form.Branch }} &&
          ~/.config/git/worktree-init ../{{ .Form.Dir }}
        loadingText: "Creating worktree..."
        output: "log"

      - key: "l"
        context: "global"
        description: "List all worktrees"
        command: "git worktree list"
        output: "popup"
        outputTitle: "Git Worktrees"

      - key: "p"
        context: "global"
        description: "Prune stale worktree entries"
        prompts:
          - type: "confirm"
            title: "Prune Worktrees"
            body: "Remove stale worktree references?"
        command: "git worktree prune"
        loadingText: "Pruning..."
        output: "log"

  # ===========================================================================
  # Status commands
  # ===========================================================================
  - key: "M"
    context: "status"
    description: "Open new Ghostty terminal in project"
    command: "open -a Ghostty ."
  - key: "O"
    context: "status"
    description: "Open project in Cursor"
    command: "cursor ."

  # ===========================================================================
  # Files commands
  # ===========================================================================
  - key: "G"
    context: "files"
    description: "Generate and create commits with Claude Code"
    command: "/opt/homebrew/bin/claude -p '/git-commit-workflows:create-commit' --model sonnet"
    output: terminal
  - key: "b"
    context: "files"
    description: "Git blame in terminal"
    command: "git blame --color-by-age --color-lines {{ .SelectedFile.Name }} | delta --paging=always"
    output: "terminal"

  # ===========================================================================
  # Commits commands
  # ===========================================================================
  - key: "G"
    command: "gh pr view -w"
    context: "commits"
    description: "Open Github PR in browser"
  - key: O
    context: commits
    description: open files in commit
    command: >-
      {{- if gt (len .SelectedCommit.Parents) 0 -}}
        git diff -z --name-only {{ index .SelectedCommit.Parents 0 }} {{ .SelectedCommit.Sha }} | xargs -0 cursor --
      {{- else -}}
        # no parent; compare against empty tree (shows all files in the root commit)
        git diff -z --name-only $(git hash-object -t tree /dev/null) {{ .SelectedCommit.Sha }} | xargs -0 cursor --
      {{- end -}}

  # ===========================================================================
  # Branches commands
  # ===========================================================================
  - key: "G"
    command: "gh pr view -w {{.SelectedLocalBranch.Name}}"
    context: "localBranches"
    description: "Open Github PR in browser"
  - key: "<c-g>"
    context: "localBranches"
    description: "Generate and create PRs with Claude Code"
    command: "/opt/homebrew/bin/claude -p '/git-pr-workflows:create-pr' --model sonnet"
    output: terminal

  # --- List & checkout a GitHub PR interactively ---
  - key: "v"
    context: "localBranches"
    description: "Checkout GitHub PR"
    loadingText: "Checking out GitHub Pull Request..."
    command: "gh pr checkout {{.Form.PullRequestNumber}}"
    prompts:
      - type: "menuFromCommand"
        title: "Which PR do you want to check out?"
        key: "PullRequestNumber"
        command: >-
          gh pr list --json number,title,headRefName,updatedAt
          --template '{{`{{range .}}{{printf "#%v: %s - %s (%s)\n" .number .title .headRefName (timeago .updatedAt)}}{{end}}`}}'
        filter: "#(?P<number>[0-9]+): (?P<title>.+) - (?P<ref_name>[^ ]+).*"
        valueFormat: "{{.number}}"
        labelFormat: '{{"#" | black | bold}}{{.number | white | bold}} {{.title | yellow | bold}}{{" [" | black | bold}}{{.ref_name | green}}{{"]" | black | bold}}'

  # --- Prune local branches whose remote is gone ---
  - key: "<c-p>"
    context: "localBranches"
    description: "Prune gone branches (remote deleted)"
    loadingText: "Pruning gone branches..."
    command: >-
      git fetch -p && for branch in $(git for-each-ref --format '%(refname) %(upstream:track)' refs/heads
      | awk '$2 == "[gone]" {sub("refs/heads/", "", $1); print $1}'); do git branch -D $branch; done
    output: "log"

  # ===========================================================================
  # Remotes commands
  # ===========================================================================

  # --- Prune deleted remote branches ---
  - key: "<c-p>"
    context: "remotes"
    description: "Prune deleted remote branches"
    command: "git remote prune {{.SelectedRemote.Name}}"
    loadingText: "Pruning..."
    output: "log"

  # --- Create sibling worktree from selected branch + new branch ---
  - key: "N"
    context: "localBranches"
    description: "New sibling worktree from {{ .SelectedLocalBranch.Name }}"
    prompts:
      - type: "input"
        title: "New branch & worktree name (from {{ .SelectedLocalBranch.Name }}):"
        key: "Name"
        initialValue: ""
    command: >-
      git worktree add ../{{ .Form.Name }} {{ .SelectedLocalBranch.Name }} -b {{ .Form.Name }} &&
      ~/.config/git/worktree-init ../{{ .Form.Name }}
    loadingText: "Creating worktree..."
    output: "log"

  # ===========================================================================
  # Worktrees panel commands
  # ===========================================================================

  # --- Create sibling worktree with new branch from current HEAD ---
  - key: "N"
    context: "worktrees"
    description: "New sibling worktree (new branch from {{ .CheckedOutBranch.Name }})"
    prompts:
      - type: "input"
        title: "New branch & worktree name (from {{ .CheckedOutBranch.Name }}):"
        key: "Name"
        initialValue: ""
    command: >-
      git worktree add ../{{ .Form.Name }} {{ .CheckedOutBranch.Name }} -b {{ .Form.Name }} &&
      ~/.config/git/worktree-init ../{{ .Form.Name }}
    loadingText: "Creating worktree..."
    output: "log"

  # --- Force-remove selected worktree ---
  - key: "D"
    context: "worktrees"
    description: "Force remove selected worktree"
    prompts:
      - type: "confirm"
        title: "Force Remove Worktree"
        body: "Are you sure you want to force-remove {{ .SelectedWorktree.Path }}? Uncommitted changes will be lost."
    command: "git worktree remove -f {{ .SelectedWorktree.Path | quote }}"
    loadingText: "Removing worktree..."
    output: "log"

# ===========================================================================
# Git settings
# ===========================================================================
git:
  pagers:
    - colorArg: always
      pager: delta --paging=never --line-numbers --hyperlinks --hyperlinks-file-link-format="cursor://file/{path}:{line}"

# ===========================================================================
# OS / editor settings
# ===========================================================================
os:
  edit: zed {{filename}}
